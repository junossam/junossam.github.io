<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정렬 알고리즘 만들기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .desc {
      margin: 0 0 20px;
      color: #4b5563;
      line-height: 1.6;
    }
    .panel {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .top-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .field label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }
    select {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 15px;
      background: white;
      color: #111827;
    }
    .swap-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 12px;
      padding: 10px 12px;
      color: #92400e;
      font-weight: 700;
    }
    .swap-hint input {
      width: 18px;
      height: 18px;
      margin: 0;
    }
    .cards {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }
    .card {
      min-height: 120px;
      border: 3px solid #d1d5db;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      background: linear-gradient(135deg, #ffffff, #eef2ff);
      color: #111827;
      padding: 8px;
    }
    .card:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .card.back {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-size: 22px;
      letter-spacing: 2px;
    }
    .card.selected {
      border-color: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.25);
    }
    .card.fixed {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      color: #065f46;
      border-color: #10b981;
      cursor: default;
    }
    .card.pending-swap {
      border-color: #ef4444;
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.22);
      animation: pulseSwap 0.8s ease-in-out infinite;
    }
    @keyframes pulseSwap {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      align-items: center;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f9fafb;
      color: #374151;
      line-height: 1.6;
      min-height: 56px;
    }
    .info {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .info-box {
      background: #f9fafb;
      border-radius: 14px;
      padding: 14px;
    }
    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .value {
      font-size: 24px;
      font-weight: 800;
    }
    .result {
      margin-top: 14px;
      font-weight: 700;
      color: #065f46;
    }
    .copyright {
      margin-top: 28px;
      padding: 18px 8px 8px;
      text-align: center;
      font-size: 13px;
      line-height: 1.8;
      color: #6b7280;
    }
    .copyright strong {
      display: block;
      color: #4b5563;
      font-size: 14px;
      margin-bottom: 2px;
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .cards {
        grid-template-columns: repeat(5, minmax(90px, 1fr)) !important;
      }
    }
    @media (max-width: 700px) {
      .info { grid-template-columns: 1fr 1fr; }
      .card { min-height: 100px; font-size: 28px; }
      .cards {
        grid-template-columns: repeat(3, minmax(90px, 1fr)) !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>카드 정렬 실습</h1>
    <p class="desc">
      카드 개수와 데이터 형태를 정한 뒤 게임을 시작하세요.
      카드 2장을 선택한 뒤 <b>보기</b>로 숫자를 확인하고,
      필요하면 <b>바꾸기</b>로 위치를 교환하세요.
      <b>자동 바꾸기</b>를 켜면 보기 후 1초 뒤에 자동으로 교환됩니다.
    </p>

    <div class="panel">
      <div class="top-controls">
        <div class="field">
          <label for="cardCountSelect">카드 개수</label>
          <select id="cardCountSelect">
            <option value="5">5장</option>
            <option value="10" selected>10장</option>
            <option value="15">15장</option>
            <option value="20">20장</option>
          </select>
        </div>

        <div class="field">
          <label for="dataModeSelect">데이터 형태</label>
          <select id="dataModeSelect">
            <option value="random" selected>무작위</option>
            <option value="sorted">정렬됨</option>
            <option value="reverse">역정렬</option>
          </select>
        </div>
      </div>

      <div class="cards" id="cards"></div>

      <div class="controls">
        <button id="revealBtn" disabled>보기</button>
        <button id="swapBtn" disabled>바꾸기</button>
        <label class="swap-hint" for="autoSwapToggle">
          <input id="autoSwapToggle" type="checkbox" />
          <span>자동 바꾸기</span>
        </label>
        <button id="fixBtn" disabled>고정</button>
        <button id="hideBtn" class="secondary">다시 뒷면으로</button>
        <button id="resetBtn" class="secondary">새 게임</button>
      </div>

      <div class="status" id="status">카드 2장을 선택하세요.</div>

      <div class="info">
        <div class="info-box">
          <div class="label">선택된 위치</div>
          <div class="value" id="selectedInfo">-</div>
        </div>
        <div class="info-box">
          <div class="label">보기 횟수</div>
          <div class="value" id="revealCount">0</div>
        </div>
        <div class="info-box">
          <div class="label">바꾸기 횟수</div>
          <div class="value" id="swapCount">0</div>
        </div>
        <div class="info-box">
          <div class="label">고정된 카드</div>
          <div class="value" id="fixedCount">0</div>
        </div>
      </div>

      <div class="result" id="result"></div>
    </div>

    <div class="copyright">
      <strong>© 2026 Junossam | 교사 강준호 · 성서고등학교</strong>
      본 페이지는 생성형 인공지능을 활용한 바이브 코딩 방식으로 구현하였습니다.
    </div>
  </div>

  <script>
    const cardContainer = document.getElementById('cards');
    const cardCountSelect = document.getElementById('cardCountSelect');
    const dataModeSelect = document.getElementById('dataModeSelect');
    const autoSwapToggleEl = document.getElementById('autoSwapToggle');
    const revealBtn = document.getElementById('revealBtn');
    const swapBtn = document.getElementById('swapBtn');
    const fixBtn = document.getElementById('fixBtn');
    const hideBtn = document.getElementById('hideBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('status');
    const selectedInfoEl = document.getElementById('selectedInfo');
    const revealCountEl = document.getElementById('revealCount');
    const swapCountEl = document.getElementById('swapCount');
    const fixedCountEl = document.getElementById('fixedCount');
    const resultEl = document.getElementById('result');

    let cardCount = 10;
    let numbers = [];
    let revealed = [];
    let selected = [];
    let fixed = [];
    let revealCount = 0;
    let swapCount = 0;
    let pendingSwap = [];
    let isSwapLocked = false;

    function shuffledNumbers(count) {
      const pool = Array.from({ length: 100 }, (_, i) => i + 1);
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, count);
    }

    function createNumbersByMode(count, mode) {
      const base = shuffledNumbers(count);

      if (mode === 'sorted') {
        return [...base].sort((a, b) => a - b);
      }
      if (mode === 'reverse') {
        return [...base].sort((a, b) => b - a);
      }
      return base;
    }

    function getModeLabel(mode) {
      if (mode === 'sorted') return '정렬된 데이터';
      if (mode === 'reverse') return '역정렬된 데이터';
      return '무작위 데이터';
    }

    function isSorted(arr) {
      return arr.every((v, i) => i === 0 || arr[i - 1] <= v);
    }

    function getOrderedSelectedPair() {
      if (selected.length !== 2) return null;
      const [a, b] = selected;
      return a < b ? [a, b] : [b, a];
    }

    function shouldSwapSelectedCards() {
      const orderedPair = getOrderedSelectedPair();
      if (!orderedPair) return false;

      const [leftIndex, rightIndex] = orderedPair;
      if (!revealed[leftIndex] || !revealed[rightIndex]) return false;

      return numbers[leftIndex] > numbers[rightIndex];
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function updateCounters() {
      revealCountEl.textContent = String(revealCount);
      swapCountEl.textContent = String(swapCount);
      fixedCountEl.textContent = String(fixed.filter(Boolean).length);
    }

    function setCardsLayout() {
      const currentCount = Number(cardCountSelect.value);

      if (currentCount <= 5) {
        cardContainer.style.gridTemplateColumns = `repeat(${currentCount}, minmax(90px, 1fr))`;
      } else if (currentCount === 10) {
        cardContainer.style.gridTemplateColumns = 'repeat(10, minmax(90px, 1fr))';
      } else if (currentCount === 15) {
        cardContainer.style.gridTemplateColumns = 'repeat(15, minmax(70px, 1fr))';
      } else if (currentCount === 20) {
        cardContainer.style.gridTemplateColumns = 'repeat(10, minmax(70px, 1fr))';
      } else {
        cardContainer.style.gridTemplateColumns = `repeat(${currentCount}, minmax(90px, 1fr))`;
      }
    }

    function setStatus(message) {
      statusEl.innerHTML = message;
    }

    function checkSorted() {
      const sorted = isSorted(numbers);
      const allFixed = fixed.length > 0 && fixed.every(Boolean);

      if (sorted && allFixed) {
        resultEl.textContent = '정렬 완료! 모든 카드가 고정되었고 오름차순으로 정렬되었습니다.';
      } else if (sorted) {
        resultEl.textContent = '숫자는 오름차순입니다. 필요한 카드를 고정해 보세요.';
      } else {
        resultEl.textContent = '';
      }
    }

    function updateButtons() {
      const twoSelected = selected.length === 2;
      revealBtn.disabled = isSwapLocked || !twoSelected;
      swapBtn.disabled = isSwapLocked || !twoSelected || selected.some((i) => fixed[i]);
      fixBtn.disabled = isSwapLocked || selected.length === 0 || selected.some((i) => !revealed[i] || fixed[i]);
    }

    function renderCards() {
      cardContainer.innerHTML = '';
      setCardsLayout();

      numbers.forEach((num, index) => {
        const card = document.createElement('button');
        card.className = 'card';
        card.type = 'button';

        if (fixed[index]) {
          card.classList.add('fixed');
          card.textContent = String(num);
          card.disabled = true;
        } else if (revealed[index]) {
          card.textContent = String(num);
        } else {
          card.classList.add('back');
          card.textContent = '뒷면';
        }

        if (selected.includes(index)) {
          card.classList.add('selected');
        }
        if (pendingSwap.includes(index)) {
          card.classList.add('pending-swap');
        }

        card.addEventListener('click', () => toggleSelect(index));
        cardContainer.appendChild(card);
      });

      updateButtons();
      updateCounters();
      selectedInfoEl.textContent = selected.length ? selected.map((i) => i + 1).join(', ') : '-';
      checkSorted();
    }

    function clearUnfixedRevealedCards(indices) {
      indices.forEach((i) => {
        if (!fixed[i]) {
          revealed[i] = false;
        }
      });
    }

    function toggleSelect(index) {
      if (isSwapLocked) {
        return;
      }

      if (fixed[index]) {
        setStatus('고정된 카드는 선택하거나 바꿀 수 없습니다.');
        return;
      }

      if (selected.includes(index)) {
        selected = selected.filter((i) => i !== index);
        if (!fixed[index]) {
          revealed[index] = false;
        }
      } else {
        if (selected.length >= 2) {
          clearUnfixedRevealedCards([...selected]);
          selected = [index];
          renderCards();
          setStatus(`이전에 선택한 카드들은 다시 뒷면으로 돌렸습니다. ${index + 1}번 카드를 선택했습니다. 한 장 더 선택하세요.`);
          return;
        }
        selected.push(index);
      }

      renderCards();

      if (selected.length === 2) {
        const orderedPair = getOrderedSelectedPair();
        setStatus(`${orderedPair[0] + 1}번 위치 카드와 ${orderedPair[1] + 1}번 위치 카드를 선택했습니다.`);
      } else if (selected.length === 1) {
        setStatus(`${selected[0] + 1}번 카드를 선택했습니다. 한 장 더 선택하세요.`);
      } else {
        setStatus('카드 2장을 선택하세요.');
      }
    }

    function performSwap() {
      const orderedPair = getOrderedSelectedPair();
      if (!orderedPair) return false;

      const [a, b] = orderedPair;
      if (fixed[a] || fixed[b]) {
        setStatus('고정된 카드는 바꿀 수 없습니다.');
        return false;
      }

      [numbers[a], numbers[b]] = [numbers[b], numbers[a]];
      [revealed[a], revealed[b]] = [revealed[b], revealed[a]];
      [fixed[a], fixed[b]] = [fixed[b], fixed[a]];
      swapCount += 1;
      return true;
    }

    function initGame() {
      cardCount = Number(cardCountSelect.value);
      const mode = dataModeSelect.value;

      numbers = createNumbersByMode(cardCount, mode);
      revealed = Array(cardCount).fill(false);
      selected = [];
      fixed = Array(cardCount).fill(false);
      revealCount = 0;
      swapCount = 0;
      pendingSwap = [];
      isSwapLocked = false;
      resultEl.textContent = '';
      renderCards();
      setStatus(`${getModeLabel(mode)}로 새 게임을 시작했습니다. 카드 2장을 선택하세요.`);
    }

    revealBtn.addEventListener('click', async () => {
      if (selected.length !== 2 || isSwapLocked) return;

      const orderedPair = getOrderedSelectedPair();
      const [leftIndex, rightIndex] = orderedPair;

      const alreadyRevealed = orderedPair.every((i) => revealed[i]);
      if (alreadyRevealed) {
        setStatus('이미 선택된 카드가 앞면으로 공개되어 있습니다.');
        return;
      }

      orderedPair.forEach((i) => {
        revealed[i] = true;
      });
      revealCount += 1;
      renderCards();

      const leftValue = numbers[leftIndex];
      const rightValue = numbers[rightIndex];
      const shouldSwap = shouldSwapSelectedCards();

      if (autoSwapToggleEl.checked && shouldSwap) {
        pendingSwap = [leftIndex, rightIndex];
        isSwapLocked = true;
        renderCards();
        setStatus(`${leftIndex + 1}번 위치 카드 = <b>${leftValue}</b>, ${rightIndex + 1}번 위치 카드 = <b>${rightValue}</b>. 앞쪽 카드가 더 크므로 1초 뒤 자동으로 바꿉니다.`);

        await sleep(1000);

        const swapped = performSwap();
        pendingSwap = [];
        isSwapLocked = false;
        renderCards();

        if (swapped) {
          setStatus(`${leftIndex + 1}번 위치 카드와 ${rightIndex + 1}번 위치 카드가 자동으로 교환되었습니다.`);
        }
        return;
      }

      const extraMessage = shouldSwap
        ? ' 앞쪽 카드의 숫자가 더 크므로 바꾸기가 필요합니다.'
        : ' 앞쪽 카드가 더 작거나 같으므로 바꾸지 않아도 됩니다.';
      setStatus(`${leftIndex + 1}번 위치 카드 = <b>${leftValue}</b>, ${rightIndex + 1}번 위치 카드 = <b>${rightValue}</b>.${extraMessage}`);
    });

    swapBtn.addEventListener('click', () => {
      if (selected.length !== 2 || isSwapLocked) return;

      const orderedPair = getOrderedSelectedPair();
      const [a, b] = orderedPair;
      const swapped = performSwap();
      renderCards();

      if (swapped) {
        setStatus(`${a + 1}번 위치 카드와 ${b + 1}번 위치 카드의 위치를 바꿨습니다.`);
      }
    });

    fixBtn.addEventListener('click', () => {
      if (selected.length === 0 || isSwapLocked) return;

      const canFix = selected.every((i) => revealed[i] && !fixed[i]);
      if (!canFix) {
        setStatus('앞면으로 공개된 카드만 고정할 수 있습니다.');
        return;
      }

      selected.forEach((i) => {
        fixed[i] = true;
        revealed[i] = true;
      });

      const fixedPositions = selected.map((i) => i + 1).sort((a, b) => a - b).join(', ');
      selected = [];
      renderCards();
      setStatus(`${fixedPositions}번 카드를 고정했습니다. 고정된 카드는 항상 앞면으로 보이고 바꿀 수 없습니다.`);
    });

    hideBtn.addEventListener('click', () => {
      if (isSwapLocked) return;
      revealed = revealed.map((_, i) => fixed[i]);
      selected = [];
      pendingSwap = [];
      renderCards();
      setStatus('선택되지 않은 카드는 다시 뒷면으로 돌렸습니다.');
    });

    resetBtn.addEventListener('click', () => {
      initGame();
    });

    cardCountSelect.addEventListener('change', () => {
      initGame();
    });

    dataModeSelect.addEventListener('change', () => {
      initGame();
    });

    function runTests() {
      console.assert(isSorted([1, 2, 3, 4]) === true, 'Test failed: sorted array should return true');
      console.assert(isSorted([1, 3, 2, 4]) === false, 'Test failed: unsorted array should return false');

      const sample10 = shuffledNumbers(10);
      console.assert(sample10.length === 10, 'Test failed: should generate 10 numbers');
      console.assert(new Set(sample10).size === 10, 'Test failed: numbers should be unique');
      console.assert(sample10.every((n) => n >= 1 && n <= 100), 'Test failed: numbers should be between 1 and 100');

      const sorted10 = createNumbersByMode(10, 'sorted');
      console.assert(sorted10.length === 10, 'Test failed: sorted mode should generate requested number of cards');
      console.assert(isSorted(sorted10) === true, 'Test failed: sorted mode should return ascending order');

      const reverse10 = createNumbersByMode(10, 'reverse');
      console.assert(reverse10.length === 10, 'Test failed: reverse mode should generate requested number of cards');
      console.assert(reverse10.every((v, i) => i === 0 || reverse10[i - 1] >= v), 'Test failed: reverse mode should return descending order');

      selected = [3, 1];
      const orderedPair = getOrderedSelectedPair();
      console.assert(orderedPair[0] === 1 && orderedPair[1] === 3, 'Test failed: ordered pair should follow card position, not click order');

      numbers = [30, 10, 50, 80];
      selected = [0, 1];
      revealed = [true, true, false, false];
      console.assert(shouldSwapSelectedCards() === true, 'Test failed: swap should be needed when left card value is bigger');

      numbers = [10, 30, 50, 80];
      selected = [1, 0];
      revealed = [true, true, false, false];
      console.assert(shouldSwapSelectedCards() === false, 'Test failed: swap should not depend on click order');

      numbers = [30, 10, 50, 80];
      selected = [0, 1];
      revealed = [true, false, false, false];
      console.assert(shouldSwapSelectedCards() === false, 'Test failed: hidden card pair should not trigger swap');

      numbers = [40, 20, 60, 80];
      selected = [1, 0];
      revealed = [true, true, false, false];
      fixed = [false, false, false, false];
      swapCount = 0;
      const swapped = performSwap();
      console.assert(swapped === true, 'Test failed: performSwap should return true on successful swap');
      console.assert(numbers[0] === 20 && numbers[1] === 40, 'Test failed: performSwap should exchange numbers based on position');
      console.assert(swapCount === 1, 'Test failed: performSwap should increment swap count');

      numbers = [40, 20, 60, 80];
      selected = [0, 1];
      revealed = [true, true, false, false];
      fixed = [true, false, false, false];
      swapCount = 0;
      const blockedSwap = performSwap();
      console.assert(blockedSwap === false, 'Test failed: performSwap should fail when a fixed card is selected');
      console.assert(swapCount === 0, 'Test failed: failed swap should not increment swap count');

      pendingSwap = [1, 2];
      console.assert(pendingSwap.includes(1) && pendingSwap.includes(2), 'Test failed: pending swap markers should store both selected cards');
    }

    runTests();
    initGame();
  </script>
