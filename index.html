<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>접근 금지 | Junossam</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #eef2f7, #dfe7f1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
    }

    .panel {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(6px);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .logo {
      width: 110px;
      display: block;
      mix-blend-mode: multiply;
    }

    .brand-text {
      font-size: 34px;
      font-weight: 800;
      color: #374151;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 42px;
      font-weight: 800;
      color: #111827;
    }

    .desc {
      margin: 0 auto 20px;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
    }

    .sub {
      margin: 0 auto 28px;
      max-width: 560px;
      font-size: 15px;
      line-height: 1.7;
      color: #6b7280;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #9ca3af;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 36px 22px;
      }

      .logo {
        width: 88px;
      }

      .brand-text {
        font-size: 26px;
      }

      h1 {
        font-size: 32px;
      }

      .desc {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="panel">

    <!-- 브랜드 -->
    <div class="brand">
      <img src="logo.png" class="logo" alt="Junossam 로고">
      <div class="brand-text">Junossam</div>
    </div>

    <div class="badge">PRIVATE SPACE</div>

    <h1>접근 금지</h1>

    <p class="desc">
      이 페이지는 개인적으로 운영되는 공간입니다.
    </p>

    <p class="sub">
      허가되지 않은 접근은 제한됩니다.<br>
      해당 페이지는 외부 공개를 목적으로 하지 않습니다.
    </p>

    <div class="footer">
      © 2026 Junossam
    </div>

  </div>
</body>
</html>
